<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Dark Mode Toggle -->
    <div class="toggle-container">
      <button onclick="toggleDarkMode()">🌙</button>
    </div>

    <h1>📝 To-Do List</h1>

    <!-- Input -->
    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Add a new task...">
      <button onclick="addTask()">+</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button id="allBtn" onclick="filterTasks('all')">All</button>
      <button id="completedBtn" onclick="filterTasks('completed')">Completed</button>
      <button id="pendingBtn" onclick="filterTasks('pending')">Pending</button>
    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
